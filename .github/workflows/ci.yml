name: ci

on:
  pull_request:
  push:
    branches: [main]
  # The merge queue integrates a pull request onto the current main, then runs
  # this workflow against that integrated commit before it lands. The full tier
  # runs on this event (see the full-tier step), so the queue is the pre-merge
  # gate that keeps the complete suite passing on the exact state being merged.
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Read-only: no job writes to the repository (the retired Python backend
# coverage-badge job was the only writer).
permissions:
  contents: read

jobs:
  # Detect whether the change needs the expensive jobs (the Windows backend
  # matrix, the frontend build, and the compiling Rust workspace jobs) or is
  # documentation-only. A pull request, or a merge-queue run, that touches only
  # Markdown skips them; any other path, and a push to main, runs them. The
  # verdict is consumed by the gated jobs' `if:` and by the always-running
  # `ci-gate` sentinel below, which is the required check.
  changes:
    name: Detect change scope
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.classify.outputs.code }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Full history so the base..head range resolves to the PR's commits.
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      # Pure stdlib + git, so no dependency install is needed. Emits code=false
      # only when every changed path is Markdown. On the merge queue the range is
      # the integrated commit's base..head (the queued change merged onto main),
      # so a documentation-only change skips the expensive jobs in the queue too.
      #
      # The gating LOGIC runs from the BASE commit's copy of the script, not the
      # PR head's, so a fork pull request cannot rewrite classify_change_scope.py
      # to emit code=false and skip the test gates. The trusted base script still
      # classifies the head's actual diff (the changed-file list is data the fork
      # cannot forge); only the docs-vs-code rules come from the base. The script
      # is pure stdlib + git and accepts --repo-root, so it runs standalone over
      # the checked-out head. If it is absent on the base (the commit that first
      # introduced it, or any other non-gated event), the step falls back to
      # code=true so the suite runs.
      - name: Classify the change scope
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MERGE_GROUP_BASE_SHA: ${{ github.event.merge_group.base_sha }}
          MERGE_GROUP_HEAD_SHA: ${{ github.event.merge_group.head_sha }}
        run: |
          case "$EVENT_NAME" in
            pull_request) base_sha="$PR_BASE_SHA" ;;
            merge_group) base_sha="$MERGE_GROUP_BASE_SHA" ;;
            *) base_sha="" ;;
          esac
          script="backend/scripts/classify_change_scope.py"
          base_script="$RUNNER_TEMP/classify_change_scope.base.py"
          if [ -n "$base_sha" ] && git show "$base_sha:$script" > "$base_script" 2>/dev/null; then
            echo "Classifying from the base commit's script ($base_sha)."
            python "$base_script" --repo-root "$GITHUB_WORKSPACE"
          else
            echo "Classifier absent on the base (or no gated range); code=true (run the jobs)."
            echo "code=true" >> "$GITHUB_OUTPUT"
          fi

  golden-ratification:
    name: Golden ratification guard
    runs-on: ubuntu-latest
    # The guard compares the changed commits against their base, so it needs a
    # two-sided range. It runs on a pull request (the review-time gate) and on
    # the merge queue's integrated commit (this is a required check, so it must
    # report a status on the merge_group event or the queue stalls; it also
    # re-verifies the guard on the exact state about to land). A plain push to
    # main is excluded: that state already cleared this check on its PR and in
    # the queue.
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Full history so the base..head range resolves to the PR's commits.
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      # Fail when a commit modifies a committed golden (a scenario fingerprint /
      # DB-state snapshot, an HTTP-response or OpenAPI snapshot, a consistency
      # golden, or the coverage matrix) without BOTH the documented
      # 'test: regenerate goldens' commit-message marker AND a recorded
      # independent ratification verdict. The marker proves the regeneration was
      # conscious; the verdict supplies the correctness sign-off the marker
      # cannot. The verdict is a report committed to
      # backend/testing/ratifications/<slug>.md in this same PR range, carrying
      # an 'ORACLE-RATIFICATION ... VERDICT: ratification-sound' block that names
      # the changed sets, so an independent party (not the change's author)
      # signed off and a stale verdict from a prior regeneration cannot bless a
      # fresh golden change. Together this stops a regression being silently
      # ratified by regenerating the expected output. CI can only presence-check
      # and parse the verdict, not prove the review happened; that residual is
      # closed by the report being reviewer-visible and by the human merge to
      # main. Pure stdlib + git, so no dependency install is needed.
      - name: Guard golden ratification
        # On a pull request the range is the PR's base..head; on the merge queue
        # it is the integrated commit's base..head (the queued change merged onto
        # main), which carries the same commits, golden edits, and ratification
        # report the PR did.
        env:
          RANGE_BASE: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_sha || github.event.pull_request.base.sha }}
          RANGE_HEAD: ${{ github.event_name == 'merge_group' && github.event.merge_group.head_sha || github.event.pull_request.head.sha }}
        run: python -m backend.scripts.check_golden_ratification --range "$RANGE_BASE..$RANGE_HEAD"

  authoring-lint:
    name: Authoring lint (em dash + UK spelling)
    runs-on: ubuntu-latest
    # The lint is diff-scoped, so it needs a base..head range to know which lines
    # the change adds. It runs on a pull request (review time) and on the merge
    # queue's integrated commit (the exact lines about to land), mirroring the
    # golden-ratification guard above. A plain push to main is excluded: that
    # state already cleared this on its PR and in the queue. The version-stamp
    # parity check is whole-tree rather than diff-scoped, so it runs as its own
    # step below (and locally via the pre-commit hook).
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Full history so the base..head range resolves to the PR's commits.
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      # Flag em dashes (U+2014) in any added line, and US spellings in added
      # prose lines (docs + comments), on the lines this PR adds only. Pre-existing
      # content is out of scope by construction, so the gate binds new authoring
      # without forcing a drive-by sweep of the old. Pure stdlib + git, so no
      # dependency install is needed.
      - name: Lint newly authored lines
        # PR base..head on a pull request; the integrated commit's base..head on
        # the merge queue (the same added lines, merged onto main).
        env:
          RANGE_BASE: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_sha || github.event.pull_request.base.sha }}
          RANGE_HEAD: ${{ github.event_name == 'merge_group' && github.event.merge_group.head_sha || github.event.pull_request.head.sha }}
        run: python -m backend.scripts.check_authoring_lint --range "$RANGE_BASE..$RANGE_HEAD"

      - name: Check version-stamp parity
        # Whole-tree, not diff-scoped: the three version stamps (frontend
        # package.json, the Cargo workspace package, tauri.conf.json) must agree.
        # authoring-lint is a required input of the ci-gate aggregator, so this
        # binds the parity check at PR and merge-queue time, not just locally.
        run: python -m backend.scripts.check_version_stamps

  frontend:
    name: Frontend (build + check + test)
    runs-on: ubuntu-latest
    # Skipped on a documentation-only pull request, like the backend matrix; the
    # ci-gate sentinel covers the required-check report in that case.
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # Fails when the committed generated API types drift from the OpenAPI
      # snapshot (the frontend twin of the backend's openapi drift gate).
      - run: npm run gen:api:check
      - run: npm run build
      - run: npm run check
      # Biome lint + format gate over the TypeScript and JavaScript sources
      # (Svelte components stay under svelte-check above).
      - run: npm run lint
      - run: npm run test

  frontend-e2e:
    name: Frontend e2e + visual (native shell, Windows)
    runs-on: windows-latest
    # Drives the REAL Tauri WebView2 shell through tauri-driver (not a browser),
    # so it runs on Windows, the app's platform, and compiles the shell. It is
    # the only surface that exercises the native IPC command boundary end to end.
    # Gated on change scope like the backend matrix.
    #
    # BLOCKING (a required input of the ci-gate aggregator): the suite drives the
    # app at its own tauri:// origin (native IPC) with the deterministic in-process
    # api_request stub, and every visual capture is gated on a recovered inner
    # viewport (ensureViewport), so the WebView2 inner-viewport collapse is
    # absorbed rather than flaking the gate. A failure uploads the actual + diff
    # PNGs for inspection.
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    env:
      SQLX_OFFLINE: "true"
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (branch SHA; dtolnay has no semver tags)
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: frontend/src-tauri
          # Restrict cache writes to the trusted main timeline; PR and merge-queue
          # runs restore read-only so a branch cannot seed or poison the cache.
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: npm ci
      # tauri-driver bridges WebdriverIO to the platform WebView2 WebDriver.
      - name: Install tauri-driver
        run: cargo install tauri-driver --locked
      # The Edge WebDriver must match the runner's WebView2 Evergreen runtime
      # version exactly, so it is resolved at run time rather than committed.
      - name: Fetch the matching WebView2 driver
        shell: pwsh
        run: |
          $key = "HKLM:\SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}"
          $pv = (Get-ItemProperty $key -ErrorAction SilentlyContinue).pv
          if (-not $pv) { $pv = (Get-ItemProperty "HKLM:\SOFTWARE\WOW6432Node\Microsoft\Edge\BLBeacon" -ErrorAction SilentlyContinue).version }
          if (-not $pv) { throw "could not determine the WebView2 / Edge version" }
          Write-Host "WebView2 / Edge version: $pv"
          New-Item -ItemType Directory -Force -Path e2e/.drivers | Out-Null
          Invoke-WebRequest "https://msedgedriver.microsoft.com/$pv/edgedriver_win64.zip" -OutFile "$env:RUNNER_TEMP\edgedriver.zip"
          Expand-Archive "$env:RUNNER_TEMP\edgedriver.zip" -DestinationPath e2e/.drivers -Force
      # The e2e build embeds the frontend and serves it at the app's own tauri://
      # origin (native IPC), built with the `e2e-stub` feature (the in-process
      # api_request fixture stub) and E2E_FREEZE_TWEENS (chart-tween determinism
      # for the visual baselines). tauri.e2e.conf.json is an e2e-only overlay
      # (capture window size + CSP) that never ships.
      - name: Build the e2e shell
        run: npx tauri build --debug --no-bundle --features e2e-stub --config src-tauri/entropia-orme/tauri.e2e.conf.json
        env:
          E2E_FREEZE_TWEENS: '1'
      - name: Run the native-shell e2e suite
        run: npm run test:e2e
      - name: Run the visual regression suite
        run: npm run test:visual
      # On failure, publish the actual + diff PNGs the visual suite writes so a
      # mismatch is inspectable: the diff is otherwise discarded with the runner.
      # Path is repo-root relative;
      # upload-artifact does not honour the job's working-directory default.
      # include-hidden-files is required: the output dir starts with a dot, and
      # v4 excludes hidden paths by default (which would upload nothing).
      - name: Upload visual diff on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: visual-diff-${{ github.run_id }}-${{ github.run_attempt }}
          path: frontend/e2e/.visual-output
          include-hidden-files: true
          retention-days: 14
          if-no-files-found: warn

  rust-policy:
    name: Rust workspace (fmt + audit + deny)
    runs-on: ubuntu-latest
    # Cheap source- and manifest-level checks on the Rust workspace (the Tauri
    # shell plus the native-backend members), so they run unconditionally like
    # the other lint-class jobs above. Formatting reads the source of every
    # member; the audit and licence/ban gates read the workspace Cargo.lock, so
    # none of them compile anything and an ubuntu runner is sufficient and fast.
    defaults:
      run:
        working-directory: frontend/src-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (branch SHA; dtolnay has no semver tags)
        with:
          toolchain: 1.96.0
          components: rustfmt
      # Prebuilt binaries rather than cargo install, which would compile both
      # tools from source on every run.
      - uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-audit,cargo-deny
      - name: Check formatting
        run: cargo fmt --check
      # -D warnings makes the ignore policy in .cargo/audit.toml load-bearing:
      # an advisory not explicitly ignored there fails the job rather than
      # scrolling past as a warning.
      - name: Audit the dependency tree (RustSec advisories)
        run: cargo audit -D warnings
      # Advisories, licence allowlist, bans, and registry sources, per the
      # policy in deny.toml.
      - name: Check the supply-chain policy (licences, bans, sources)
        run: cargo deny check

  rust:
    name: Rust workspace (clippy + build + test, Windows)
    runs-on: windows-latest
    # Compiles the whole workspace, so it runs on the application's real target
    # rather than linting the Linux configuration of a Windows-only artefact
    # (most of the shell sits behind cfg(windows)). Skipped on a
    # documentation-only pull request like the backend matrix; the ci-gate
    # sentinel covers the required-check report in that case.
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    defaults:
      run:
        working-directory: frontend/src-tauri
    env:
      # Compile-time-checked SQL resolves against the committed .sqlx offline
      # cache rather than a live database. The cache is empty until persistence
      # code lands; once it holds query metadata, a stale cache fails the build
      # loudly (regenerate with `cargo sqlx prepare`).
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (branch SHA; dtolnay has no semver tags)
        with:
          toolchain: 1.96.0
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: frontend/src-tauri
          # Restrict cache writes to the trusted main timeline; PR and merge-queue
          # runs restore read-only so a branch cannot seed or poison the cache.
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # --all-targets lints the test and bench code too; -D warnings promotes
      # every lint to a failure so the gate cannot drift into an
      # ignored-warnings state.
      - name: Lint (clippy)
        run: cargo clippy --workspace --all-targets -- -D warnings
      # A debug compile check of every member; the release bundle (tauri build)
      # stays a manual release-time step. The debug profile resolves the
      # frontend through the dev URL, so the shell compiles without a frontend
      # build present.
      - name: Compile check
        run: cargo build
      # Prebuilt binary, same rationale as the members job. nextest applies the
      # committed per-test terminating timeout (.config/nextest.toml), so an
      # intermittent hook-lifecycle hang is killed at 120s instead of stalling
      # the job to the runner ceiling.
      - uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-nextest
      - name: Run workspace tests
        timeout-minutes: 20
        run: cargo nextest run --workspace
      # nextest does NOT run doctests; keep them on a dedicated cargo-test leg so
      # doctest coverage is not silently dropped by the migration.
      - name: Run workspace doctests
        timeout-minutes: 10
        run: cargo test --workspace --doc

  rust-members:
    name: Rust backend members (nextest, Linux)
    runs-on: ubuntu-latest
    # The native-backend members (eo-http, eo-services, eo-wire) must build and
    # test without the Tauri toolchain. This runner is the structural proof: it
    # has none of the Tauri system stack installed (webkit2gtk et al.), and the
    # package selection keeps the shell crate (the only Tauri-coupled member)
    # out of the dependency graph entirely, so a GUI dependency creeping into
    # backend code fails this job rather than landing silently. Skipped on a
    # documentation-only pull request like the backend matrix; the ci-gate
    # sentinel covers the required-check report in that case.
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    defaults:
      run:
        working-directory: frontend/src-tauri
    env:
      # See the Windows workspace job: the committed .sqlx offline cache backs
      # compile-time-checked SQL; empty until persistence code lands.
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (branch SHA; dtolnay has no semver tags)
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: frontend/src-tauri
          # Restrict cache writes to the trusted main timeline; PR and merge-queue
          # runs restore read-only so a branch cannot seed or poison the cache.
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # Prebuilt binary rather than cargo install (same rationale as the
      # policy job's tools).
      - uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-nextest
      - name: Run the backend-member tests (nextest)
        run: cargo nextest run -p eo-wire -p eo-http -p eo-services
      # The criterion micro-benchmark rail, compile-check only: shared CI
      # runners produce noisy timings, so benchmark figures are taken locally
      # when a hot path lands, and CI guarantees the benches keep building.
      - name: Compile the criterion benches
        run: cargo bench -p eo-services --no-run

  rust-coverage:
    name: Rust backend members (branch coverage)
    runs-on: ubuntu-latest
    # Measures per-member branch coverage over the native-backend members.
    # The figure is review evidence, not vanity: a ported service's branch
    # coverage shows whether its tests actually exercise the code paths its
    # behavioural-equivalence claim rests on, so it is read against the
    # service's pre-port coverage whenever a port lands. Branch-level
    # instrumentation is a nightly-only compiler feature, hence the pinned
    # nightly toolchain on this measurement job (the gating test run stays on
    # stable in the members job above; this job re-runs the same tests, so a
    # test failure fails here too). Skipped on documentation-only pull
    # requests like the backend matrix.
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    defaults:
      run:
        working-directory: frontend/src-tauri
    env:
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      # Pin the exact nightly (branch-coverage instrumentation is a nightly-only
      # compiler feature) so the measured figure is reproducible run to run. The
      # action ref is pinned to the nightly branch SHA (dtolnay has no semver
      # tags); the dated nightly itself is pinned via the toolchain input below.
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly (branch SHA; dtolnay has no semver tags)
        with:
          toolchain: nightly-2026-06-17
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: frontend/src-tauri
          # Restrict cache writes to the trusted main timeline; PR and merge-queue
          # runs restore read-only so a branch cannot seed or poison the cache.
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - name: Measure branch coverage (cargo-llvm-cov)
        run: cargo llvm-cov nextest --branch -p eo-wire -p eo-http -p eo-services

  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    # The SINGLE required check on the default branch: it subsumes every gating
    # job (the frontend build, the Rust workspace, golden ratification, and the
    # authoring lint) so branch protection requires only this one context and
    # never drifts when an individual job is added, renamed, or removed. It
    # always runs (if: always()), so it always reports a status, and it is
    # fail-closed: it passes only when the change is documentation-only (the
    # change-scope-gated jobs were legitimately skipped) or when every gated job
    # succeeded. A detection that did not run cleanly, or a code change whose
    # jobs did not pass, fails it, so a skip can never let an untested change
    # merge. This lets a documentation-only pull request go green in seconds
    # without deadlocking on a never-reported required job.
    needs: [changes, golden-ratification, authoring-lint, frontend, frontend-e2e, rust-policy, rust, rust-members, rust-coverage]
    if: always()
    steps:
      - name: Require the gated jobs to have passed (or been documentation-only)
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          CODE: ${{ needs.changes.outputs.code }}
          GOLDEN_RATIFICATION_RESULT: ${{ needs.golden-ratification.result }}
          AUTHORING_LINT_RESULT: ${{ needs.authoring-lint.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          FRONTEND_E2E_RESULT: ${{ needs.frontend-e2e.result }}
          RUST_POLICY_RESULT: ${{ needs.rust-policy.result }}
          RUST_RESULT: ${{ needs.rust.result }}
          RUST_MEMBERS_RESULT: ${{ needs.rust-members.result }}
          RUST_COVERAGE_RESULT: ${{ needs.rust-coverage.result }}
        shell: bash
        run: |
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "::error::Change-scope detection did not succeed (result: $CHANGES_RESULT); failing closed."
            exit 1
          fi
          # The Rust policy job is unconditional (it does not compile, so it is
          # not gated on change scope) and must pass on every run, a push to main
          # included.
          if [ "$RUST_POLICY_RESULT" != "success" ]; then
            echo "::error::The Rust workspace policy checks (fmt, audit, deny) did not pass (result: $RUST_POLICY_RESULT)."
            exit 1
          fi
          # The golden ratification guard and the authoring lint run on pull
          # requests and the merge queue (the gating events). They are skipped on
          # a direct push to main, where the gate tolerates the skip because the
          # gating already happened at the pull-request and merge-queue runs. A
          # real failure on a gating event still fails the gate.
          if [ "$GOLDEN_RATIFICATION_RESULT" != "success" ] && [ "$GOLDEN_RATIFICATION_RESULT" != "skipped" ]; then
            echo "::error::The golden ratification guard did not pass (result: $GOLDEN_RATIFICATION_RESULT)."
            exit 1
          fi
          if [ "$AUTHORING_LINT_RESULT" != "success" ] && [ "$AUTHORING_LINT_RESULT" != "skipped" ]; then
            echo "::error::The authoring lint did not pass (result: $AUTHORING_LINT_RESULT)."
            exit 1
          fi
          if [ "$CODE" = "false" ]; then
            echo "Documentation-only change; the frontend build and Rust workspace jobs were skipped. Gate satisfied."
            exit 0
          fi
          # The native-shell e2e + visual job (frontend-e2e) is a REQUIRED input:
          # it drives the app at its tauri:// origin (native IPC) with the
          # deterministic in-process api_request stub, and every visual capture is
          # gated on a recovered inner viewport (ensureViewport), so a failure is a
          # real regression rather than the old environment flake.
          if [ "$FRONTEND_RESULT" = "success" ] && [ "$RUST_RESULT" = "success" ] && [ "$RUST_MEMBERS_RESULT" = "success" ] && [ "$RUST_COVERAGE_RESULT" = "success" ] && [ "$FRONTEND_E2E_RESULT" = "success" ]; then
            echo "Frontend build, Rust workspace, and native-shell e2e jobs passed. Gate satisfied."
            exit 0
          fi
          echo "::error::A code change must pass the frontend build, the Rust workspace jobs, and the native-shell e2e suite (frontend: $FRONTEND_RESULT, rust: $RUST_RESULT, members: $RUST_MEMBERS_RESULT, coverage: $RUST_COVERAGE_RESULT, e2e: $FRONTEND_E2E_RESULT)."
          exit 1
