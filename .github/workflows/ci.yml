name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (tests, Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # Lower bound (the supported floor) and the development version.
        python-version: ['3.11', '3.14']
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so diff-cover can find the merge-base with the PR base.
          fetch-depth: 0
          # Don't persist the auth token in .git/config for later steps.
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        run: python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      # The supported-floor leg runs the suite without coverage.
      - name: Run backend test suite
        if: matrix.python-version == '3.11'
        # Everything except the device / slow `full` tier, which runs nightly.
        run: python -m pytest -m "not full"
      # Coverage is measured on one leg only (3.14) to avoid double-counting
      # and racing coverage files; the floor lives in pyproject.toml.
      - name: Run backend test suite with coverage
        if: matrix.python-version == '3.14'
        run: python -m pytest -m "not full" --cov=backend --cov-branch --cov-report=xml --cov-report=term-missing
      # New / changed lines on a PR must clear the diff-coverage floor. Compares
      # against the PR base, so it works for the trunk-landing PR too.
      - name: Diff coverage
        if: matrix.python-version == '3.14' && github.event_name == 'pull_request'
        shell: bash
        # Pass the base ref through env rather than inline interpolation so a
        # crafted branch name cannot inject into the shell.
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch --no-tags origin "$PR_BASE_REF"
          diff-cover coverage.xml --compare-branch="origin/$PR_BASE_REF" --fail-under=85

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # Version mirrors backend/requirements-dev.txt so formatting is deterministic.
      - run: python -m pip install ruff==0.15.14
      - run: ruff check .
      - run: ruff format --check .

  typing:
    name: Typing (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      # mypy reads first-party source directly, but the runtime deps must be
      # installed so the Pydantic plugin and the typed third-party imports
      # (fastapi, numpy, pydantic) resolve. The C-extension deps are
      # import-ignored in pyproject.toml, so a display-free runner is fine.
      - name: Install dependencies
        run: python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Type-check the backend
        run: python -m mypy backend

  frontend:
    name: Frontend (build + check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run check
