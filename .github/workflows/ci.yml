name: ci

on:
  pull_request:
  push:
    branches: [main]
  # The merge queue integrates a pull request onto the current main, then runs
  # this workflow against that integrated commit before it lands. The full tier
  # runs on this event (see the full-tier step), so the queue is the pre-merge
  # gate that keeps the complete suite passing on the exact state being merged.
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Read-only by default; the backend job widens to contents: write only so the
# coverage badge can be published to the badges branch on a push to main.
permissions:
  contents: read

jobs:
  # Detect whether the change needs the expensive jobs (the Windows backend
  # matrix and the frontend build) or is documentation-only. A pull request, or a
  # merge-queue run, that touches only Markdown skips both; any other path, and a
  # push to main, runs them. The verdict is consumed by the gated jobs' `if:` and
  # by the always-running `ci-gate` sentinel below, which is the required check.
  changes:
    name: Detect change scope
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.classify.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the base..head range resolves to the PR's commits.
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # Pure stdlib + git, so no dependency install is needed. Emits code=false
      # only when every changed path is Markdown. On the merge queue the range is
      # the integrated commit's base..head (the queued change merged onto main),
      # so a documentation-only change skips the expensive jobs in the queue too.
      - name: Classify the change scope
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MERGE_GROUP_BASE_SHA: ${{ github.event.merge_group.base_sha }}
          MERGE_GROUP_HEAD_SHA: ${{ github.event.merge_group.head_sha }}
        run: python -m backend.scripts.classify_change_scope

  backend:
    name: Backend (tests, Python ${{ matrix.python-version }})
    runs-on: windows-latest
    # Skipped on a documentation-only pull request; the ci-gate sentinel then
    # passes on the docs-only verdict, so the required check still reports.
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: write
    # Run the property-based suites with more examples than the local default.
    env:
      HYPOTHESIS_PROFILE: ci
    strategy:
      fail-fast: false
      matrix:
        # Lower bound (the supported floor) and the development version.
        python-version: ['3.11', '3.14']
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so diff-cover can find the merge-base with the PR base.
          fetch-depth: 0
          # Don't persist the auth token in .git/config for later steps.
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        # uv resolves and installs the same two requirements files pip did, into
        # the setup-python interpreter (`--system`), but parallelises the download
        # and install so a warm-cached run drops from ~90s to a few seconds. The
        # requirements files stay the single source of truth; uv resolves them to
        # the same latest-compatible versions pip would, and setup-uv caches the
        # wheel store keyed on those files.
        run: uv pip install --system -r backend/requirements.txt -r backend/requirements-dev.txt
      # The supported-floor leg runs the fast + standard tiers without coverage.
      # The full tier (the contract suites + OCR equivalence) is excluded by the
      # marker filter; it runs on the merge queue and post-merge on main and
      # nightly (see the full-tier step below and nightly.yml), not on either
      # per-PR leg.
      - name: Run backend test suite
        if: matrix.python-version == '3.11'
        # Positive tier selection (`fast or standard`) rather than a negative
        # exclusion: a test that lands without a tier marker stays out of the PR
        # leg until it is deliberately classified, so an unclassified slow or
        # device test cannot silently join the per-PR run. `--strict-markers`
        # plus the conftest tier-map keep the markers honest at collection time.
        # Parallelised with `--dist=loadfile -n auto`: re-benchmarked at the
        # current suite size, the heavy per-worker import cost (onnxruntime,
        # OpenCV, FastAPI) is now a small fraction of the run, and xdist roughly
        # halves this leg. It was once a net loss: at a ~3-min suite the re-import
        # cost dominated and `-n auto` measured ~14.5 min, which is why this leg
        # ran serially; the suite has since grown and the decision reverses (see
        # TESTING.md "Parallelism"). `loadfile` keeps each test file on one worker
        # so module-scoped fixtures and file-local state stay intact; randomised
        # order is preserved (pytest-randomly seeds across workers) to keep
        # surfacing intra-file ordering coupling, and the nightly serial run is the
        # thorough cross-file coupling net.
        run: python -m pytest -m "fast or standard" --dist=loadfile -n auto
      # Coverage is measured on one leg only (3.14) to avoid double-counting and
      # racing coverage files; the floor lives in pyproject.toml. On a pull
      # request this measures the fast + standard tiers alone, which clear the
      # floor on their own (the seeded API-surface tests cover the router
      # branches). On the merge queue and on a push to main the full-tier step
      # below appends its coverage (--cov-append) before the report and badge, so
      # the floor is enforced over the full surface there and the published badge
      # reflects it. Test order is pinned on the coverage legs so the measured
      # figure is reproducible run to run; the 3.11 leg keeps randomised order to
      # surface inter-test coupling.
      - name: Run backend test suite with coverage
        if: matrix.python-version == '3.14'
        # Same positive tier selection as the floor leg above, parallelised the
        # same way (`--dist=loadfile -n auto`). Coverage is accurate under xdist:
        # pytest-cov collects per-worker and combines into one dataset. Order is
        # still pinned (`-p no:randomly`) for a run-to-run reproducible figure,
        # though a coverage total is a set union of executed lines and so is
        # independent of order and worker count regardless.
        run: python -m pytest -m "fast or standard" -p no:randomly --cov=backend --cov-branch --cov-report= --dist=loadfile -n auto
      # The full tier (the two schemathesis contract suites + OCR equivalence) is
      # the slowest part of the suite. It does not run on the per-PR gate, so a pull
      # request waits only on the fast + standard tiers. It runs here in two places
      # so nothing reaches main un-vetted by the full suite: on the merge queue's
      # integrated commit (the pre-merge gate, before the change lands) and again
      # post-merge on the push to main (confirming the squashed commit that
      # actually landed, and where the coverage badge is published; nightly.yml
      # carries it a third time as the scheduled safety net). Its coverage is
      # appended to the run above so the published badge reflects the full surface.
      # Single-worker with pinned order: the stateful schemathesis pass carries
      # per-process generation state, and pinned serial execution makes the
      # appended coverage reproducible run to run.
      - name: Run the full-tier suites (merge queue + post-merge to main)
        if: matrix.python-version == '3.14' && (github.event_name == 'merge_group' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
        run: python -m pytest -m full -p no:randomly --cov=backend --cov-branch --cov-append --cov-report=
      # Report once over the combined data: enforce the total floor and write the
      # XML the diff-coverage gate and the badge step consume.
      - name: Combine and report coverage
        if: matrix.python-version == '3.14'
        shell: bash
        run: |
          python -m coverage report --show-missing
          python -m coverage xml
      # New / changed lines on a PR must clear the diff-coverage floor. Compares
      # against the PR base, so it works for the trunk-landing PR too.
      - name: Diff coverage
        if: matrix.python-version == '3.14' && github.event_name == 'pull_request'
        shell: bash
        # Pass the base ref through env rather than inline interpolation so a
        # crafted branch name cannot inject into the shell.
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch --no-tags origin "$PR_BASE_REF"
          diff-cover coverage.xml --compare-branch="origin/$PR_BASE_REF" --fail-under=85
      # Refresh the coverage badge from the just-measured report. Only on a push
      # to main (not PRs), so the published figure tracks the trunk.
      - name: Publish coverage badge
        if: matrix.python-version == '3.14' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import xml.etree.ElementTree as ET

          rate = float(ET.parse("coverage.xml").getroot().get("line-rate"))
          pct = round(rate * 100, 1)
          bands = [(90, "brightgreen"), (80, "green"), (70, "yellowgreen"), (60, "yellow"), (50, "orange")]
          colour = next((c for floor, c in bands if pct >= floor), "red")
          badge = {"schemaVersion": 1, "label": "coverage", "message": f"{pct}%", "color": colour}
          with open("coverage.json", "w", encoding="utf-8") as f:
              json.dump(badge, f)
          print("coverage", pct)
          PY
          bash .github/scripts/publish-badge.sh coverage.json

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # Version mirrors backend/requirements-dev.txt so formatting is deterministic.
      - run: python -m pip install ruff==0.15.14
      - run: ruff check .
      - run: ruff format --check .

  typing:
    name: Typing (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      # mypy reads first-party source directly, but the runtime deps must be
      # installed so the Pydantic plugin and the typed third-party imports
      # (fastapi, numpy, pydantic) resolve. The C-extension deps are
      # import-ignored in pyproject.toml, so a display-free runner is fine.
      - name: Install dependencies
        run: python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Type-check the backend
        run: python -m mypy backend

  audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # Version mirrors backend/requirements-dev.txt.
      - run: python -m pip install "pip-audit>=2.7"
      # Audit the pinned manifests rather than the ambient environment, so only
      # the project's own runtime and dev dependencies are in scope. --strict
      # fails the job if any dependency cannot be fully audited.
      - name: Audit dependencies
        run: pip-audit -r backend/requirements.txt -r backend/requirements-dev.txt --strict

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install "pre-commit>=3.8"
      # The mypy and fast-test hooks run against the project virtual
      # environment; the dedicated typing and backend jobs already enforce those
      # checks, so they are skipped here to keep this job to the hooks pre-commit
      # manages itself (ruff and the hygiene hooks) without installing the full
      # dependency tree a second time.
      - name: Run pre-commit hooks
        env:
          SKIP: mypy,pytest-fast,biome
        run: pre-commit run --all-files --show-diff-on-failure

  golden-ratification:
    name: Golden ratification guard
    runs-on: ubuntu-latest
    # The guard compares the changed commits against their base, so it needs a
    # two-sided range. It runs on a pull request (the review-time gate) and on
    # the merge queue's integrated commit (this is a required check, so it must
    # report a status on the merge_group event or the queue stalls; it also
    # re-verifies the guard on the exact state about to land). A plain push to
    # main is excluded: that state already cleared this check on its PR and in
    # the queue.
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the base..head range resolves to the PR's commits.
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # Fail when a commit modifies a committed golden (a scenario fingerprint /
      # DB-state snapshot, an HTTP-response or OpenAPI snapshot, a consistency
      # golden, or the coverage matrix) without BOTH the documented
      # 'test: regenerate goldens' commit-message marker AND a recorded
      # independent ratification verdict. The marker proves the regeneration was
      # conscious; the verdict supplies the correctness sign-off the marker
      # cannot. The verdict is a report committed to
      # backend/testing/ratifications/<slug>.md in this same PR range, carrying
      # an 'ORACLE-RATIFICATION ... VERDICT: ratification-sound' block that names
      # the changed sets, so an independent party (not the change's author)
      # signed off and a stale verdict from a prior regeneration cannot bless a
      # fresh golden change. Together this stops a regression being silently
      # ratified by regenerating the expected output. CI can only presence-check
      # and parse the verdict, not prove the review happened; that residual is
      # closed by the report being reviewer-visible and by the human merge to
      # main. Pure stdlib + git, so no dependency install is needed.
      - name: Guard golden ratification
        # On a pull request the range is the PR's base..head; on the merge queue
        # it is the integrated commit's base..head (the queued change merged onto
        # main), which carries the same commits, golden edits, and ratification
        # report the PR did.
        env:
          RANGE_BASE: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_sha || github.event.pull_request.base.sha }}
          RANGE_HEAD: ${{ github.event_name == 'merge_group' && github.event.merge_group.head_sha || github.event.pull_request.head.sha }}
        run: python -m backend.scripts.check_golden_ratification --range "$RANGE_BASE..$RANGE_HEAD"

  authoring-lint:
    name: Authoring lint (em dash + UK spelling)
    runs-on: ubuntu-latest
    # The lint is diff-scoped, so it needs a base..head range to know which lines
    # the change adds. It runs on a pull request (review time) and on the merge
    # queue's integrated commit (the exact lines about to land), mirroring the
    # golden-ratification guard above. A plain push to main is excluded: that
    # state already cleared this on its PR and in the queue. The version-stamp
    # parity check is whole-tree rather than diff-scoped, so it rides the
    # pre-commit job instead of here.
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the base..head range resolves to the PR's commits.
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # Flag em dashes (U+2014) in any added line, and US spellings in added
      # prose lines (docs + comments), on the lines this PR adds only. Pre-existing
      # content is out of scope by construction, so the gate binds new authoring
      # without forcing a drive-by sweep of the old. Pure stdlib + git, so no
      # dependency install is needed.
      - name: Lint newly authored lines
        # PR base..head on a pull request; the integrated commit's base..head on
        # the merge queue (the same added lines, merged onto main).
        env:
          RANGE_BASE: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_sha || github.event.pull_request.base.sha }}
          RANGE_HEAD: ${{ github.event_name == 'merge_group' && github.event.merge_group.head_sha || github.event.pull_request.head.sha }}
        run: python -m backend.scripts.check_authoring_lint --range "$RANGE_BASE..$RANGE_HEAD"

  frontend:
    name: Frontend (build + check + test)
    runs-on: ubuntu-latest
    # Skipped on a documentation-only pull request, like the backend matrix; the
    # ci-gate sentinel covers the required-check report in that case.
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # Fails when the committed generated API types drift from the OpenAPI
      # snapshot (the frontend twin of the backend's openapi drift gate).
      - run: npm run gen:api:check
      - run: npm run build
      - run: npm run check
      # Biome lint + format gate over the TypeScript and JavaScript sources
      # (Svelte components stay under svelte-check above).
      - run: npm run lint
      - run: npm run test

  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    # The required check on the default branch, in place of the individual
    # backend-matrix and frontend contexts. It always runs (if: always()), so it
    # always reports a status, and it is fail-closed: it passes only when the
    # change is documentation-only (the gated jobs were legitimately skipped) or
    # when both gated jobs succeeded. A detection that did not run cleanly, or a
    # code change whose jobs did not pass, fails it, so a skip can never let an
    # untested change merge. This lets a documentation-only pull request go green
    # in seconds without deadlocking on a never-reported required job.
    needs: [changes, backend, frontend]
    if: always()
    steps:
      - name: Require the gated jobs to have passed (or been documentation-only)
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          CODE: ${{ needs.changes.outputs.code }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
        shell: bash
        run: |
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "::error::Change-scope detection did not succeed (result: $CHANGES_RESULT); failing closed."
            exit 1
          fi
          if [ "$CODE" = "false" ]; then
            echo "Documentation-only change; the backend matrix and frontend build were skipped. Gate satisfied."
            exit 0
          fi
          if [ "$BACKEND_RESULT" = "success" ] && [ "$FRONTEND_RESULT" = "success" ]; then
            echo "Backend matrix and frontend build passed. Gate satisfied."
            exit 0
          fi
          echo "::error::A code change must pass the backend matrix and the frontend build (backend: $BACKEND_RESULT, frontend: $FRONTEND_RESULT)."
          exit 1
