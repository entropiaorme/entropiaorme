name: Docs

# Publishes the architecture handbook (mdBook) and the generated Rust API
# reference (cargo doc) to GitHub Pages. The handbook documents the latest
# landed state, so the deploy runs on pushes to main that touch the docs or the
# documented Rust crates; pull requests get a build-only validation so a broken
# book or a broken doc build is caught before it reaches main.
#
# This is a standalone workflow. It is deliberately not wired into the required
# ci-gate in ci.yml: a documentation publish should never gate a code merge.
on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "frontend/src-tauri/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "frontend/src-tauri/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Least privilege by default. Only the deploy job is granted the Pages tokens.
permissions:
  contents: read

# Allow a single concurrent Pages deployment and never cancel an in-flight
# publish (a cancelled deploy can leave the site half-updated).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build handbook and API reference
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.96.0 (branch SHA; dtolnay has no semver tags)

      - name: Cache the cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: frontend/src-tauri
          # Restrict cache writes to the trusted main timeline (parity with ci.yml / release.yml).
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install mdBook and the link checker
        uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: mdbook,lychee

      - name: Build the handbook
        run: mdbook build docs

      - name: Check in-book links (offline; fails on any broken internal link)
        run: lychee --offline --no-progress --root-dir "$PWD/docs/book" docs/book

      - name: Build the Rust API reference for the backend crates
        # The native backend spine: the portable library crates that a
        # contributor reads. The Tauri shell crate (entropia-orme) is a Windows
        # host with platform-specific build inputs and is documented from the
        # Windows build, so it is excluded here to keep this job runner-portable.
        working-directory: frontend/src-tauri
        run: cargo doc --no-deps -p eo-wire -p eo-http -p eo-services

      - name: Assemble the published site
        run: |
          set -euo pipefail
          site="$(mktemp -d)"
          cp -r docs/book/. "$site/"
          mkdir -p "$site/api"
          cp -r frontend/src-tauri/target/doc/. "$site/api/"
          # Redirect /api to a crate root so the API reference has a landing page.
          printf '%s\n' '<!doctype html><meta http-equiv="refresh" content="0; url=eo_http/index.html">' > "$site/api/index.html"
          echo "SITE_DIR=$site" >> "$GITHUB_ENV"

      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ${{ env.SITE_DIR }}

  deploy:
    name: Deploy to GitHub Pages
    # Publish from main; pull-request runs validate the build above without deploying.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
