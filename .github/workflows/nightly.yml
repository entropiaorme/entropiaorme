name: nightly

on:
  schedule:
    # 07:00 UTC daily, off-peak.
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # Version mirrors backend/requirements-dev.txt.
      - run: python -m pip install "pip-audit>=2.7"
      # A scheduled re-audit catches advisories published after a change landed
      # green, with no code change required to surface them.
      - name: Audit dependencies
        run: pip-audit -r backend/requirements.txt -r backend/requirements-dev.txt --strict
