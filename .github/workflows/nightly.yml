name: nightly

on:
  schedule:
    # 07:00 UTC daily, off-peak.
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Read-only by default; the publish-mutation-badge job widens to contents: write
# so the mutation-score badge can be pushed to the badges branch. The campaign
# job itself stays read-only (it builds repository code), mirroring the coverage
# measure/publish split in ci.yml.
permissions:
  contents: read

jobs:
  rust-mutation:
    name: Mutation testing (cargo-mutants)
    # The mutation campaign over the native-backend workspace members, the proof
    # the test net has no holes. The Tauri shell stays out of the campaign: its
    # logic is OS-window plumbing behind cfg(windows), and building it needs the
    # Tauri system toolchain this Linux runner deliberately lacks. The acceptance
    # bar is the per-file floor map in the cargo xtask `mutation-floors` guard:
    # files without an adopted floor are held to no-missed-mutants and floors only
    # ratchet up. The aggregate score is published as the README's mutation badge.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/src-tauri
    env:
      # Compile-time-checked SQL resolves against the committed .sqlx offline
      # cache; empty until persistence code lands.
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0 (branch SHA; dtolnay has no semver release tags)
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: frontend/src-tauri
          # Restrict cache writes to the trusted main timeline; PR and merge-queue
          # runs restore read-only so a branch cannot seed or poison the cache.
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # Prebuilt binary rather than cargo install, which would compile the
      # tool from source on every run.
      - uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-mutants
      # Package selection scopes both the mutants and the per-mutant test runs
      # to the backend members, keeping the Tauri-coupled shell out of the
      # build graph entirely. --in-place because member tests read committed
      # fixtures from the repo outside this cargo workspace (for example the
      # relocated corpus under frontend/src-tauri/fixtures/), which
      # cargo-mutants' default copied build tree does not contain. Exit codes 2
      # (missed mutants) and 3 (timed-out mutants) are outcome reports, tolerated
      # here because the floors step below is the acceptance bar (it counts a
      # timeout as caught); anything else (usage error, failing baseline,
      # internal error) still fails this step.
      - name: Run mutation campaign (backend members)
        run: cargo mutants --package eo-wire --package eo-http --package eo-services --in-place || { rc=$?; test "$rc" -eq 2 -o "$rc" -eq 3; }
      # Reduce the campaign to the aggregate-score shields badge. Badge-only mode
      # always exits 0, so the badge reflects reality even when the floors step
      # below fails; built on every run, published (next job) only from main.
      - name: Build mutation badge
        run: cargo run -q -p xtask -- mutation-floors --outcomes mutants.out/outcomes.json --badge-out mutation.json
      # Hand the badge to the main-only publish job as an artifact rather than
      # pushing here: this job builds repository code, so it must never carry a
      # write-scoped token (mirrors the coverage measure/publish split).
      - name: Upload mutation badge
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mutation-badge
          # Repo-root relative: upload-artifact ignores the job's working-directory.
          path: frontend/src-tauri/mutation.json
          if-no-files-found: error
          retention-days: 1
      # The acceptance gate: enforce the per-file floors (no --badge-out, so this
      # invocation enforces and fails on any regression below an adopted floor or
      # a missed mutant in a no-floor file). Runs after the badge build, so the
      # badge still reflects reality on a regression.
      - name: Enforce the per-file mutation floors
        run: cargo run -q -p xtask -- mutation-floors --outcomes mutants.out/outcomes.json

  # Publish the mutation badge to the badges branch, from the trunk only. Kept
  # separate from the campaign job so the write-scoped token never attaches to a
  # run that builds repository code: this job runs no repository code, it only
  # downloads the badge artifact and pushes it. if: always() so the badge still
  # publishes when the floors gate failed (the badge then shows the regressed
  # figure, matching the measure-then-publish-then-enforce ordering above).
  publish-mutation-badge:
    name: Publish mutation badge
    runs-on: ubuntu-latest
    needs: [rust-mutation]
    if: ${{ always() && github.ref == 'refs/heads/main' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: mutation-badge
      - name: Publish mutation badge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/publish-badge.sh mutation.json
