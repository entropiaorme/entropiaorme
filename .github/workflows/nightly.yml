name: nightly

on:
  schedule:
    # 07:00 UTC daily, off-peak.
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Read-only by default; the mutation job widens to contents: write only so the
# mutation-score badge can be published to the badges branch.
permissions:
  contents: read

jobs:
  audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # Version mirrors backend/requirements-dev.txt.
      - run: python -m pip install "pip-audit>=2.7"
      # A scheduled re-audit catches advisories published after a change landed
      # green, with no code change required to surface them.
      - name: Audit dependencies
        run: pip-audit -r backend/requirements.txt -r backend/requirements-dev.txt --strict

  backend-full:
    name: Backend full-tier suite (Python ${{ matrix.python-version }})
    # The full tier (the schemathesis contract suites + OCR equivalence) plus a
    # complete-suite re-run under randomised order. The full tier does not
    # block the per-PR gate (it runs here nightly and post-merge on a push to
    # main, see ci.yml), and the randomised order surfaces cross-file isolation
    # coupling the pinned per-PR legs cannot. Windows, the application's platform.
    runs-on: windows-latest
    # The scheduled cadence runs the property suites at the deepest example
    # budget: the `nightly` Hypothesis profile (1000 examples), beyond the
    # per-PR `ci` profile's 300.
    env:
      HYPOTHESIS_PROFILE: nightly
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.14']
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        run: python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      # No tier filter: the complete suite (fast + standard + full), randomised
      # order on (pytest-randomly default), so every tier and their interaction
      # is exercised. OCR equivalence skips without the local recorded corpus.
      - name: Run the complete backend suite, all tiers
        run: python -m pytest

  determinism:
    name: Multi-seed determinism (seed slot ${{ matrix.seed-slot }})
    # The order-determinism guard: three concurrently seeded runs of the
    # per-PR suite shape (fast + standard, xdist loadfile) under explicitly
    # set, logged pytest-randomly seeds. Every golden-asserting test runs in
    # each leg, so a red leg means some output depended on test order or on
    # residual wall-clock state; the printed seed reproduces it exactly
    # (locally: pytest -m "fast or standard" -n auto --dist=loadfile
    # --randomly-seed=<seed>). Seeds derive from the run number, so the
    # explored seed space rotates nightly while any failure stays
    # deterministic to replay. This lives here rather than on the per-PR
    # gate so the wall-clock cost of multiplied runs never lands on a pull
    # request; the per-PR 3.11 leg keeps its fresh-seed randomised order as
    # the always-on early warning.
    runs-on: windows-latest
    env:
      HYPOTHESIS_PROFILE: ci
    strategy:
      fail-fast: false
      matrix:
        seed-slot: [0, 1, 2]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        run: python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Run the suite under the slot's seed
        run: |
          $seed = ${{ github.run_number }} * 10 + ${{ matrix.seed-slot }}
          Write-Output "Determinism seed: $seed"
          python -m pytest backend/tests/ -m "fast or standard" -n auto --dist=loadfile --randomly-seed=$seed

  mutation:
    name: Mutation testing (mutmut)
    # The mutation engine has no native Windows support, so the campaign runs on
    # Linux. The targeted modules are pure logic, so the platform is immaterial
    # to the result.
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        run: python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      # Bounded Hypothesis profile: a high-example profile times thousands of
      # mutants would be intractable. The campaign config lives in pyproject.toml
      # ([tool.mutmut]); it mutates the pure-logic core and runs each mutant
      # against just the tests that exercise it.
      - name: Run mutation campaign
        env:
          HYPOTHESIS_PROFILE: mutation
        run: mutmut run
      # Reduce the campaign to a single score and a shields.io endpoint badge.
      - name: Compute mutation score
        run: |
          mutmut export-cicd-stats
          python -m backend.scripts.mutation_score --badge-out mutation.json
      # Publish the badge from the trunk only, so the figure tracks main.
      - name: Publish mutation-score badge
        if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/publish-badge.sh mutation.json
      # Ratchet: fail if the score has regressed below the published floor. Runs
      # after publishing, so the badge still reflects reality on a regression.
      # Two complementary gates: a ratcheted aggregate floor, and a per-module
      # floor map so a strong module can no longer mask a weak one. Each floor is
      # a few points below the measured score for headroom (incl. margin for a
      # load-sensitive timeout drifting to survived); raise as survivors are
      # killed, never lower it to make a red run pass.
      - name: Enforce the aggregate mutation-score floor
        run: python -m backend.scripts.mutation_score --fail-under 88
      # Per-module floor map. Reads mutmut's authoritative per-mutant exit codes
      # from mutants/<path>.meta (same accounting as backend.scripts.mutation_score
      # and analysis/permodule) and fails if any targeted module regresses below
      # its own floor. Inline here rather than a committed script so the gate lives
      # with the workflow it guards. The rust-mutation job below inherits these
      # floors as services port: a ported module's Rust mutation score is held to
      # at least the floor its Python original carries here.
      - name: Enforce the per-module mutation floors
        run: |
          python - <<'PY'
          import sys
          from collections import defaultdict
          from pathlib import Path

          import mutmut
          from mutmut.__main__ import (
              SourceFileMutationData,
              ensure_config_loaded,
              status_by_exit_code,
              walk_source_files,
          )

          # module -> floor %. A few points below the measured score; ratchet up,
          # never down. Scores count caught = killed + timeout over the considered
          # set (killed + timeout + suspicious + survived + no_tests).
          FLOORS = {
              "backend.data.codex_categories": 96.0,
              "backend.data.tt_value_curve": 86.0,
              "backend.services.chatlog_parser": 93.0,
              "backend.services.character_calc": 95.0,
              "backend.services.codex_service": 89.0,
              "backend.services.cost_engine": 92.0,
              "backend.services.mob_lookup_service": 95.0,
              "backend.services.quest_service": 90.0,
              "backend.services.scan_completion": 94.0,
              "backend.services.scan_drift": 85.0,
              "backend.services.scan_presets": 94.0,
              "backend.services.session_summary": 80.0,
              "backend.services.skill_panel_parse": 96.0,
              "backend.services.trifecta_service": 92.0,
              "backend.testing.store_reducers": 88.0,
              "backend.tracking.loot_filter": 85.0,
              "backend.tracking.tool_inference": 91.0,
              "backend.tracking.tracker": 82.0,
          }

          ensure_config_loaded()

          def score(d):
              caught = d.get("killed", 0) + d.get("timeout", 0)
              considered = caught + d.get("suspicious", 0) + d.get("survived", 0) + d.get("no_tests", 0)
              return (100.0 * caught / considered) if considered else 0.0

          per = defaultdict(lambda: defaultdict(int))
          for path in walk_source_files():
              if mutmut.config.should_ignore_for_mutation(path):
                  continue
              meta = Path("mutants") / (str(path) + ".meta")
              if not meta.exists():
                  continue
              m = SourceFileMutationData(path=path)
              m.load()
              if not m.exit_code_by_key:
                  continue
              mod = str(path).replace("/", ".").replace("\\", ".")[:-3]
              for _key, code in m.exit_code_by_key.items():
                  per[mod][status_by_exit_code[code].replace(" ", "_")] += 1

          fail = False
          for mod, floor in sorted(FLOORS.items()):
              if mod not in per:
                  print(f"FAIL {mod}: no mutants found (paths_to_mutate drift?)")
                  fail = True
                  continue
              s = score(per[mod])
              print(f"  {'ok  ' if s >= floor else 'FAIL'} {mod:42s} {s:5.1f}%  (floor {floor:.0f})")
              if s < floor:
                  fail = True

          if fail:
              print("Per-module mutation-score floor regression.", file=sys.stderr)
          sys.exit(1 if fail else 0)
          PY

  rust-mutation:
    name: Mutation testing (cargo-mutants)
    # The Rust counterpart of the mutmut campaign above, over the native-backend
    # workspace members. The Tauri shell stays out of the campaign: its logic is
    # OS-window plumbing behind cfg(windows), and building it needs the Tauri
    # system toolchain this Linux runner deliberately lacks. The acceptance bar
    # is the per-file floor map in backend/scripts/rust_mutation_floors.py:
    # files without an adopted floor are held to no-missed-mutants, floors only
    # ratchet up, and each ported module's floor rises to its Python original's
    # floor from the mutmut FLOORS map above when that port completes, so a
    # port cannot regress below the test strength of the code it replaces.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/src-tauri
    env:
      # Compile-time-checked SQL resolves against the committed .sqlx offline
      # cache; empty until persistence code lands.
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri
      # Prebuilt binary rather than cargo install, which would compile the
      # tool from source on every run.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      # Package selection scopes both the mutants and the per-mutant test runs
      # to the backend members, keeping the Tauri-coupled shell out of the
      # build graph entirely. --in-place because member tests read committed
      # fixtures from the repo outside this cargo workspace (for example
      # backend/testing/equivalence/), which cargo-mutants' default copied
      # build tree does not contain. Exit codes 2 (missed mutants) and 3
      # (timed-out mutants) are outcome reports, tolerated here because the
      # floors step below is the acceptance bar (it counts a timeout as
      # caught, like the Python gate); anything else (usage error, failing
      # baseline, internal error) still fails this step.
      - name: Run mutation campaign (backend members)
        run: cargo mutants --package eo-wire --package eo-http --package eo-services --in-place || { rc=$?; test "$rc" -eq 2 -o "$rc" -eq 3; }
      - name: Enforce the per-file mutation floors
        run: python3 ../../backend/scripts/rust_mutation_floors.py --outcomes mutants.out/outcomes.json

  equivalence-differential:
    name: Cross-language equivalence differentials
    # The live differential fuzzes that compare the native backend members
    # against the Python oracle at runtime (the `cross-language` feature): the
    # Normalizer fuzz and the cost-engine fuzz. They need both toolchains, so
    # they run here nightly rather than on the per-PR gate; the per-push Rust
    # jobs already pin the same cross-language surface against committed
    # fixtures (the Normalizer conformance table and the emitter byte-equality
    # proof), which were generated by the Python oracle, so every push still
    # carries a frozen cross-language check. This job adds the live random-input
    # coverage on the daily cadence. Windows, the application's platform.
    runs-on: windows-latest
    env:
      # Compile-time-checked SQL resolves against the committed .sqlx offline
      # cache; empty until persistence code lands.
      SQLX_OFFLINE: "true"
      # The oracle interpreter the differentials spawn: the setup-python
      # interpreter on PATH (there is no local virtualenv on CI).
      EO_ORACLE_PYTHON: python
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      # The oracle CLIs import the backend services + testing package; install
      # the runtime + dev requirements as the other Python jobs do.
      - name: Install dependencies
        run: python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri
      # The eo-wire / eo-services member tests with the cross-language feature
      # on: the hermetic tests plus the live differential fuzzes against the
      # Python oracle (the Normalizer and cost-engine fuzzes). The eo-http
      # arm-vs-sidecar A/B battery was retired when the sidecar was removed (the
      # sidecar is gone; eo-http behaviour is pinned by its own hermetic suite).
      - name: Run the cross-language equivalence differentials
        working-directory: frontend/src-tauri
        run: cargo test -p eo-wire -p eo-services --features cross-language
