name: release

# Tag-driven release pipeline. On a v* tag it builds the single Windows binary,
# attaches a CycloneDX SBOM, checksums, and a build-provenance attestation, and
# drafts a GitHub Release for a human to review and publish. It is standalone
# and tag-only: it never feeds the ci-gate sentinel and is not a required check,
# so it cannot block pull requests. workflow_dispatch runs the same build as a
# dry run (a clearly-named draft that is deleted after inspection).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Build, attest, and draft the release
    runs-on: windows-latest
    permissions:
      contents: write # draft the GitHub Release and upload its assets
      id-token: write # mint the OIDC token the provenance attestation signs with
      attestations: write # record the build-provenance attestation
    env:
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (branch SHA; dtolnay has no semver tags)
        with:
          toolchain: 1.96.0

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: frontend/src-tauri
          # Restrict cache writes to the trusted main timeline (parity with ci.yml).
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-cyclonedx

      - name: Verify the release version matches the tag
        # The single binary carries one version, stamped across package.json, the
        # Cargo workspace package, and tauri.conf.json (their three-way parity is
        # gated at PR and merge time). On a v* tag, assert the stamped version
        # equals the tag so a release can never ship artefacts that disagree with
        # the tag they are published under. Dispatch dry-runs carry no tag.
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          set -euo pipefail
          stamped="$(node -p "require('./frontend/src-tauri/entropia-orme/tauri.conf.json').version")"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$stamped" != "$tag" ]; then
            echo "::error::stamped version ($stamped) does not match release tag ($tag)"
            exit 1
          fi
          echo "stamped version $stamped matches tag $GITHUB_REF_NAME"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build the bespoke installer
        # build-installer.ps1 produces the per-user MSI payload, the native x86
        # bafunctions helper (built from source), and the themed WiX Burn bundle,
        # wrapping them into one branded setup.exe. The release binary and its
        # bundled resources are produced under target/release as a side effect,
        # which the portable ZIP is staged from. Pure Rust plus frontend: no
        # Python, no sidecar freeze. Unsigned while the signing key is absent
        # (see the job env). Uses the runner's bundled .NET (WiX 6 tool) and MSVC
        # x86 toolset, parity with the runner-provided Rust/Node above.
        #
        # The updater signing key is provisioned out of band as a repository
        # secret and scoped to this step, the only consumer. Absent today: the
        # build produces an unsigned installer and no updater artefacts; once
        # present the same build signs the updater manifest, inert-by-default.
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: ./scripts/build-installer.ps1

      - name: Stage release assets
        # Rename the bundler output to the brand-canonical artefact names and
        # assemble the portable ZIP (the single binary plus its bundled resources
        # and a short README, laid out as the installed application resolves
        # them). Each artefact gets a sha256sum-compatible .sha256 sidecar in the
        # documented two-space text form. All published assets land in dist/ so
        # the SBOM, checksums, provenance, and release upload share one set.
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./frontend/src-tauri/entropia-orme/tauri.conf.json').version")"
          release="frontend/src-tauri/target/release"
          mkdir -p dist

          # Installer: the bespoke WiX Burn bundle, renamed to the brand form.
          cp "$release/bundle/burn/EntropiaOrme-${version}-x64-setup.exe" \
             "dist/entropiaorme-${version}-x64-setup.exe"

          # Portable: the binary plus exactly its bundled resources, in the layout
          # the installed application resolves them from (alongside the exe).
          stage="portable/entropiaorme-${version}-x64"
          mkdir -p "$stage"
          cp "$release/entropia-orme.exe" "$stage/"
          cp -r "$release/snapshot" "$release/models" "$release/ort" "$release/demo" "$stage/"
          cp "$release/panel_geometry.json" "$stage/"
          printf '%s\n' \
            'EntropiaOrme - Portable' \
            '' \
            'Extract this folder anywhere, then run entropia-orme.exe. Keep the' \
            'snapshot, models, ort, and demo folders next to the executable.' \
            '' \
            'Settings persist to %APPDATA%\Roaming\EntropiaOrme\ on the host;' \
            'truly-portable mode is not in scope for the 0.x window.' \
            '' \
            'More info: https://entropiaorme.com' \
            > "$stage/README.txt"
          ( cd portable && 7z a -tzip "../dist/entropiaorme-${version}-x64-portable.zip" "entropiaorme-${version}-x64" >/dev/null )

          # Per-artefact .sha256 sidecars: single-line "<hash>  <name>" (two
          # spaces, sha256sum -c compatible), formatted explicitly so the output
          # never carries sha256sum's binary-mode asterisk.
          ( cd dist && for f in entropiaorme-*-x64-setup.exe entropiaorme-*-x64-portable.zip; do
              printf '%s  %s\n' "$(sha256sum "$f" | cut -d' ' -f1)" "$f" > "$f.sha256"
            done )
          ls -la dist/

      - name: Generate the SBOM (CycloneDX)
        # The shipped binary's full transitive dependency tree, vendored as
        # SBOM.json alongside the release assets.
        shell: bash
        run: |
          cargo cyclonedx --manifest-path frontend/src-tauri/entropia-orme/Cargo.toml -f json -q
          cp frontend/src-tauri/entropia-orme/entropia-orme.cdx.json dist/SBOM.json

      - name: Compute checksums
        # A single checksums manifest over every published asset, alongside the
        # per-artefact .sha256 sidecars staged above (same two-space text form).
        shell: bash
        working-directory: dist
        run: |
          set -euo pipefail
          for f in entropiaorme-*-x64-setup.exe entropiaorme-*-x64-portable.zip SBOM.json; do
            printf '%s  %s\n' "$(sha256sum "$f" | cut -d' ' -f1)" "$f"
          done > SHA256SUMS.txt

      - name: Attest build provenance
        # SLSA-style provenance over the installer and portable artefacts.
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/entropiaorme-*-x64-setup.exe
            dist/entropiaorme-*-x64-portable.zip

      - name: Draft the GitHub Release
        # Draft + Pre-release for the 0.x window: a human reviews and publishes.
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            gh release create "$TAG" --draft --prerelease \
              --title "EntropiaOrme $TAG" --generate-notes dist/*
          else
            TAG="dry-run-${{ github.run_id }}"
            gh release create "$TAG" --target "${{ github.sha }}" --draft --prerelease \
              --title "Dry run $TAG" \
              --notes "Dry-run build for pipeline inspection; delete after review." dist/*
          fi
