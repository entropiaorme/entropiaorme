# Local pre-commit hooks mirroring the continuous-integration gates, so a
# contributor catches the same failures before pushing. Hook versions are
# pinned to the versions the CI workflow uses; keeping them in step is the
# point (a hook that lints with a different version than CI defeats the
# purpose). Run `pre-commit install` once after setting up the virtual
# environment. See TESTING.md for the full description.
#
# The ruff and hygiene hooks run in pre-commit's own isolated environments.
# mypy and the test tier run as system hooks against the project virtual
# environment, because both need the installed runtime dependencies (the
# Pydantic plugin and the typed third-party imports) to resolve exactly as the
# CI typing and backend jobs do; reproducing that dependency tree inside an
# isolated hook environment would be the version drift this file exists to
# avoid.
minimum_pre_commit_version: "3.8.0"

repos:
  # Lint and format, matching the CI lint job's ruff version exactly.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # General hygiene. These read the working tree; line-ending enforcement is
  # left to .gitattributes (which sets eol per file type), so mixed-line-ending
  # only reports a file that mixes both within itself rather than rewriting one
  # convention to another.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=no]

  # Type-check and the fast test tier run against the project virtual
  # environment (activate it, or run through `just`), so they behave like the
  # CI typing and backend jobs. pip-audit is heavy, so it is reserved for the
  # manual stage rather than every commit.
  - repo: local
    hooks:
      # Frontend polling discipline: a pure-stdlib, whole-tree guard (no venv
      # dependencies, so it runs in CI's pre-commit job too, unlike mypy and the
      # test tier below). Forbids a bare setInterval outside the visibility-gated
      # helper, and any reference to the retired tracking-state-changed event.
      - id: no-bare-setinterval
        name: no bare setInterval (frontend)
        entry: python -m backend.scripts.check_no_bare_setinterval
        language: system
        pass_filenames: false
        always_run: true
      # Frontend lint + format gate, mirroring the CI frontend job's
      # `npm run lint` step. Runs the lockfile-pinned Biome from
      # frontend/node_modules so the hook and CI agree on the version (the
      # same drift argument as mypy below); needs `npm ci` run once in
      # frontend/. The CI pre-commit job SKIPs it (no node_modules there);
      # the dedicated frontend job is the enforcing gate.
      - id: biome
        name: biome check (frontend)
        entry: bash -c 'cd frontend && npx --no-install biome check .'
        language: system
        pass_filenames: false
        files: ^frontend/
      - id: mypy
        name: mypy (backend)
        entry: python -m mypy backend
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
      # The fast tier only: pure-logic, in-memory, sub-second tests, for quick
      # local feedback before a commit. It is deliberately NOT the PR gate. The
      # continuous-integration backend job runs `fast or standard`, which is a
      # strict superset, so re-running the fast tier inside CI's pre-commit job
      # would burn cycles for a subset CI already covers; that job SKIPs this
      # hook for exactly that reason. The standard tier (db / filesystem /
      # in-process stateful) is left to CI rather than the commit loop to keep
      # the hook sub-second.
      - id: pytest-fast
        name: pytest (fast tier)
        entry: python -m pytest -m fast
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
      # The two guards below are pure stdlib + git (no installed dependency
      # tree), so unlike mypy / pytest-fast they are NOT in the CI pre-commit
      # job's SKIP list: they run both locally and in CI. The authoring lint is
      # diff-scoped (it inspects the lines a change adds, against HEAD here), so
      # it computes its own diff and ignores filenames; the version-stamp parity
      # check reads the manifests whole, so both always_run.
      - id: authoring-lint
        name: authoring lint (em dash + UK spelling, diff-scoped)
        entry: python -m backend.scripts.check_authoring_lint
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true
      - id: version-stamp-parity
        name: version-stamp parity
        entry: python -m backend.scripts.check_version_stamps
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true
      - id: pip-audit
        name: pip-audit (manual stage)
        entry: pip-audit -r backend/requirements.txt -r backend/requirements-dev.txt --strict
        language: system
        pass_filenames: false
        always_run: true
        stages: [manual]
