name: mission_completion_with_reward_suppression
flavour: scripted
description: >
  Mission lifecycle wrapped around a hunt: mission received, a
  single-mob hunt, mission completed, a skill-gain that would be
  the mission reward. Pins whatever the tracker + quest_service
  do with the lifecycle pair under an unseeded quest DB (no
  quest-DB match, so quest auto-start does not fire); fuller
  reward-suppression coverage involving the junction-table and
  playlist matching lands with the keystroke / quest-automation
  harness layer, but the chatlog lifecycle pinning here catches
  regressions in the upstream parser surface.
surfaces:
  - chatlog-mission-received
  - chatlog-mission-completed
  - tracking-skill-gain-during-mission
events: 6
expected_kills: 1
character_context:
  profession_set: ""
  location: ""
  mob_species: ""
notes: >
  DSL-authored. The skill_gain after mission_completed is the
  "would-be reward" line; what the production code does with it
  is whatever the golden captures.
