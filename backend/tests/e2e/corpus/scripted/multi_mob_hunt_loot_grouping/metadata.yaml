name: multi_mob_hunt_loot_grouping
flavour: scripted
description: >
  Three mobs hunted in sequence, each with its own combat window
  and loot tick. Pins the multi-kill flush path where each loot
  announcement closes its own accumulator and a fresh combat
  window opens between kills.
surfaces:
  - tracking-multi-kill-session
  - tracking-tick-boundary
  - tracking-loot-grouping
events: 10
expected_kills: 3
expected_total_loot_ped: 12.05
character_context:
  profession_set: ""
  location: ""
  mob_species: ""
notes: >
  DSL-authored. Three distinct combat -> loot cycles separated by
  multi-second gaps so each loot tick cleanly flushes one kill.

# The committed clock plan: the frozen, driver-advanced instant schedule a
# replay of this scenario runs on (see backend/testing/clock_plan.py). The
# start instant is chosen away from the scenario's chat-log instants so a
# plan-stamped timestamp never collides with a domain timestamp.
clock:
  start: 2026-01-01T00:00:00
  step_seconds: 1.0
