name: single_mob_hunt
flavour: scripted
description: >
  One mob, multiple combat shots across three tick boundaries
  including a critical, closed by a single loot tick carrying two
  drops at the same timestamp. The simplest "real" hunt shape: one
  kill from a flurry of damage capped by a loot announcement.
  Pins the single-mob tick-buffer flush path that
  basic_hunt_10_events also exercises but at a smaller event count
  for tighter diff surface.
surfaces:
  - tracking-kill-creation
  - tracking-tick-boundary
  - tracking-critical-hit
  - tracking-loot-grouping-multi-item
events: 6
expected_kills: 1
expected_total_loot_ped: 8.40
character_context:
  profession_set: ""
  location: ""
  mob_species: ""
notes: >
  DSL-authored via build.py. Combat ticks (10:00:00 / :01 / :02)
  accumulate four shots and 87 damage; the 10:00:03 loot tick
  carries Shrapnel (8.00) + Animal Muscle Oil (0.40) and flushes
  the accumulator into a single kill row.
