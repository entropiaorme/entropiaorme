name: crit_dodge_evade_jam
flavour: scripted
description: >
  Full offensive-combat-line coverage including the trifecta of
  countered-shot paths (target dodged, target evaded, target
  jammed). Pins every offensive-combat parser line at least once
  in a single kill window so the regex precedence and prefix
  matching surface is exercised end-to-end.
surfaces:
  - chatlog-offensive-combat
  - chatlog-countered-shots
  - tracking-critical-hit
  - tracking-kill-creation
events: 8
expected_kills: 1
character_context:
  profession_set: ""
  location: ""
  mob_species: ""
notes: >
  DSL-authored. Damage shots interleaved with one critical and
  three countered-shot lines; kill closes on a Shrapnel loot
  tick.

# The committed clock plan: the frozen, driver-advanced instant schedule a
# replay of this scenario runs on (parsed by load_clock_plan in the corpus replay test). The
# start instant is chosen away from the scenario's chat-log instants so a
# plan-stamped timestamp never collides with a domain timestamp.
clock:
  start: 2026-01-01T00:00:00
  step_seconds: 1.0
