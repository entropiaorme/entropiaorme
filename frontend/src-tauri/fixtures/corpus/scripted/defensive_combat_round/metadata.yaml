name: defensive_combat_round
flavour: scripted
description: >
  Defensive-combat surface: no player offence, only incoming
  attacks (some hit, some dodged/evaded/jammed/missed/deflected),
  one self-heal. Pins the no-kill defensive path so any future
  regression that promotes a defensive line into a kill or that
  drops damage_taken accounting surfaces as a golden diff. Fills
  the parser-EventType coverage gap for the defensive combat
  family; profession-panel coverage is unrelated to the chatlog
  parser and lands via the screen-capture harness layer instead.
surfaces:
  - chatlog-defensive-combat
  - chatlog-self-heal
  - tracking-no-kill-session
events: 8
expected_kills: 0
character_context:
  profession_set: ""
  location: ""
  mob_species: ""
notes: >
  DSL-authored. No offensive shots, no loot, so the session
  ends with zero kills but non-zero damage_taken accounting.

# The committed clock plan: the frozen, driver-advanced instant schedule a
# replay of this scenario runs on (parsed by load_clock_plan in the corpus replay test). The
# start instant is chosen away from the scenario's chat-log instants so a
# plan-stamped timestamp never collides with a domain timestamp.
clock:
  start: 2026-01-01T00:00:00
  step_seconds: 1.0
