name: global_item_drop
flavour: scripted
description: >
  A local hunt closes with a kill, then a plain (non-Hall-of-Fame)
  Globals-channel rare-item announcement lands within the 5-second
  correlation window naming the test's configured player_name. Pins
  the GLOBAL_ITEM parser rule path (the plain non-HoF rare-item
  global, the lone Globals-channel branch not driven by any other
  corpus scenario) and the tracker's _on_global tagging of the most
  recent kill as is_global WITHOUT is_hof when the event is a plain
  global. Uses make_e2e_pipeline to set player_name explicitly since
  the default pipeline drops globals on the floor.
surfaces:
  - chatlog-globals-global-item
  - tracking-global-correlation
  - tracking-notable-events
events: 4
expected_kills: 1
character_context:
  profession_set: ""
  location: ""
  mob_species: ""
notes: >
  DSL-authored. Player name "TestPlayer" must match the global
  announcement's player field for correlation to fire; hof=False on
  s.globals.item keeps the plain GLOBAL_ITEM parse so the kill is
  tagged is_global but not is_hof.

# The committed clock plan: the frozen, driver-advanced instant schedule a
# replay of this scenario runs on (parsed by load_clock_plan in the corpus replay test). The
# start instant is chosen away from the scenario's chat-log instants so a
# plan-stamped timestamp never collides with a domain timestamp.
clock:
  start: 2026-01-01T00:00:00
  step_seconds: 1.0
