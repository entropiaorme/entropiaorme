name: quest_automation_with_playlist_match
flavour: scripted
description: >
  Full chat-driven quest-automation lifecycle: two missions (both
  members of the same playlist) are received, hunted, and completed
  within a single tracking session. The QuestService auto-starts each
  quest on its received line and auto-completes it on its completed
  line; the session's completed quests resolve to an exact-playlist
  match, which the analytics-link suggestion API surfaces.
surfaces:
  - quest-service-auto-start
  - quest-service-auto-complete
  - quest-reward-suppression
  - session-link-suggestion-playlist-exact-match
  - quest-playlist-membership
events: 8
expected_kills: 2
expected_total_loot_ped: 5.00
character_context:
  profession_set: ""
  location: ""
  mob_species: ""
notes: >
  The two quests ("Alpha Hunt" and "Beta Hunt") are pre-populated
  in the test's AppDatabase and added to one playlist
  ("Alpha + Beta") before chat replay. Each mission carries a
  ``reward_ped`` so completion writes a ledger row. After
  ``stop_session``, ``get_session_link_suggestion`` returns
  ``{suggestion_type: "playlist", reason: "exact_playlist"}``;
  pinned via pytest-regressions.

# The committed clock plan: the frozen, driver-advanced instant schedule a
# replay of this scenario runs on (parsed by load_clock_plan in the corpus replay test). The
# start instant is chosen away from the scenario's chat-log instants so a
# plan-stamped timestamp never collides with a domain timestamp.
clock:
  start: 2026-01-01T00:00:00
  step_seconds: 1.0
