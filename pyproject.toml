# Tool configuration for the EntropiaOrme Python backend.
#
# Tool config only: runtime dependencies live in backend/requirements.txt (the
# manifest the PyInstaller freeze consumes) and dev/test tooling in
# backend/requirements-dev.txt. There is intentionally no [project] or
# [build-system] table: the backend ships as a PyInstaller-frozen sidecar, not
# an installable wheel, so adding packaging metadata would only risk confusing
# that pipeline.

[tool.ruff]
line-length = 88
target-version = "py311"
src = ["."]

[tool.ruff.lint]
# A curated, high-signal rule set: pycodestyle/pyflakes (E, F), import sorting
# (I), pyupgrade (UP), bugbear (B), comprehensions (C4), and simplify (SIM).
select = ["E", "F", "I", "UP", "B", "C4", "SIM"]
ignore = [
    # FastAPI's dependency-injection idiom puts Depends()/Query()/Path() in
    # argument defaults by design; bugbear's function-call-in-default check is
    # a false positive for it.
    "B008",
    # `ruff format` owns line length: it wraps code to line-length but leaves
    # strings, comments, and SQL literals intact rather than forcing breaks.
    # Enforcing E501 on top would only nag about those un-splittable lines.
    "E501",
]

[tool.ruff.lint.isort]
known-first-party = ["backend"]

[tool.ruff.lint.per-file-ignores]
# main.py loads .env.local and sets process priority / UTF-8 mode before the
# heavy module imports run, so its imports are deliberately not all at the top.
"backend/main.py" = ["E402"]

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
addopts = "--strict-markers --strict-config"
markers = [
    "fast: pure-logic, in-memory, sub-second tests (run on every PR)",
    "standard: db / filesystem / in-process-stateful tests (run on every PR)",
    "full: the slowest suites (schemathesis contract suites + OCR equivalence); runs post-merge on main and nightly, not on PRs",
    "contract: schemathesis API contract tests (full tier; runs post-merge and nightly, see TESTING.md)",
    # Serial-only escape hatch for parallel runs. The PR legs distribute with
    # --dist=loadfile, which keeps each file on one worker, so a test only needs
    # this if it cannot run concurrently with tests in OTHER files (binds a fixed
    # OS port, mutates a process-wide global another file reads). No test carries
    # it today (see backend/testing/TESTING.md "Parallelism and serial-only
    # tests"); it is registered so the convention exists when one does.
    "no_xdist: must not run concurrently with tests in other files; pinned onto a single worker under --dist=loadgroup",
]

[tool.coverage.run]
# Branch coverage (not just line coverage): partial branches count, so the
# branch figure sits below the line figure by design.
branch = true
source = ["backend"]
# Store paths relative to the repo root so the coverage.xml that diff-cover
# reads resolves identically on a CI runner and a local checkout.
relative_files = true
# Device / IO / script modules that cannot be unit-covered without a real
# device or display, plus the test files themselves. These are run but not
# measured, so the floor reflects testable logic rather than hardware glue.
omit = [
    "backend/tests/*",
    "backend/scripts/demo_seed/*",
    # Maintainer utility: run in the nightly mutation workflow, not imported by
    # the suite, so it is exercised in CI rather than under pytest-cov.
    "backend/scripts/mutation_score.py",
    # Same: the cargo-mutants floor gate runs in the nightly workflow.
    "backend/scripts/rust_mutation_floors.py",
    # Maintainer measurement utility: runs whole-process benchmarks at
    # deliberate baseline milestones, never under pytest.
    "backend/scripts/capture_port_baseline.py",
    "backend/build_app.py",
    "backend/ocr/capturer.py",
    "backend/services/eu_window.py",
    "backend/services/hotbar_listener.py",
    "backend/services/spacebar_capture_listener.py",
    "backend/services/local_ocr.py",
    "backend/services/repair_ocr.py",
    "backend/services/scan_presets.py",
    "backend/services/skill_scan_manual.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
# Defensive / unreachable lines that should not count against the floor.
exclude_also = [
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "\\.\\.\\.",
]
# Floor set ~3 points below the measured branch coverage, leaving ratchet
# headroom and avoiding a brittle zero-margin gate. The HTTP read/write
# surface, the tracker cost-attribution paths, and the harness modules are now
# exercised end to end (the seeded surface and mutation walks, the weapon
# cost-attribution integration, and unit suites across the services and harness
# helpers), lifting measured branch coverage to ~90%. The residual is the
# device/IO glue (already exempt) plus main.py's lifespan wiring; as that lands
# the figure climbs and the floor is tightened to track it.
# Never lower a landed floor to make a red gate pass.
fail_under = 87

[tool.mypy]
python_version = "3.11"
# EntropiaOrme is a Windows-only desktop app, so mypy targets win32: platform
# guards (`if sys.platform == "win32":`) are evaluated as live, and the Windows
# code paths (e.g. the ctypes window-geometry helpers) are type-checked rather
# than treated as unreachable. Without this, a non-Windows checker skips those
# branches and reports their use sites as undefined.
platform = "win32"
# The Pydantic v2 plugin teaches mypy about model construction / validators;
# without it, model instantiation produces false positives.
plugins = ["pydantic.mypy"]
files = ["backend"]
# Check the bodies of unannotated functions too. This is the single
# highest-value flag short of full strict: it surfaces real bugs (bad indexing,
# wrong operands, mismatched returns) in code that has no signature yet.
check_untyped_defs = true
# An argument defaulting to None must be typed Optional explicitly.
no_implicit_optional = true
# A `# type: ignore` that no longer suppresses anything is itself an error, so
# the ignore set cannot rot as the code is annotated.
warn_unused_ignores = true
warn_redundant_casts = true

# C-extension dependencies ship no type information (no stubs, no py.typed).
# Ignore missing imports for these specific modules rather than globally, so a
# genuinely-missing first-party import still surfaces as an error.
[[tool.mypy.overrides]]
module = [
    "cv2",
    "mss",
    "mss.*",
    "pynput",
    "pynput.*",
    "onnxruntime",
    "openocr",
    "openocr.*",
    "rapidfuzz",
]
ignore_missing_imports = true

# Strict beachhead: small, pure-logic modules held to full annotation
# (disallow_untyped_defs). The typing gate ratchets outward from here as more
# modules are annotated; a module is only ever added to this list, never
# removed. To promote a module: annotate it fully, confirm `mypy backend` stays
# green, then add it here.
[[tool.mypy.overrides]]
module = [
    "backend.services.cost_engine",
    "backend.services.scan_drift",
    "backend.tracking.loot_filter",
    "backend.data.codex_categories",
    "backend.data.tt_value_curve",
]
disallow_untyped_defs = true

[tool.mutmut]
# Mutation testing: the effectiveness metric. Coverage proves a line ran;
# mutation proves a test would notice if that line were wrong. The campaign is
# slow, so it runs nightly and on demand, never per-PR (see nightly.yml). The
# engine requires a POSIX host (it has no native Windows support), so the job
# runs on Linux; the targets below are pure-logic and platform-independent.
#
# Targets: the pure-logic core only. Device, IO, and router glue carry little
# mutation value and would slow the campaign for no signal.
paths_to_mutate = [
    "backend/services/cost_engine.py",
    "backend/services/character_calc.py",
    "backend/data/codex_categories.py",
    "backend/data/tt_value_curve.py",
    "backend/services/scan_drift.py",
    "backend/tracking/loot_filter.py",
    "backend/tracking/tool_inference.py",
    # Pure skill-panel OCR parsing (name / level / bar-fill / fuzzy resolution /
    # cell slicing / PNG decode), extracted from local_ocr so the device and IO
    # glue (the ONNX engine, the screen grab, the geometry and vocab loaders)
    # stays out of the campaign. The repair cost parse is a @staticmethod, which
    # mutmut skips, so it is pinned by exhaustive unit tests rather than listed.
    "backend/services/skill_panel_parse.py",
    # The property-covered service layer: each module below carries a
    # property-based invariant suite (and, where useful, an example-based unit
    # suite) strong enough to give mutation a real signal. They are pure logic
    # (parsing, lookups, projections, reducers) or backed only by in-memory
    # SQLite, so the platform is immaterial to the result.
    "backend/services/chatlog_parser.py",
    "backend/services/mob_lookup_service.py",
    "backend/services/scan_completion.py",
    "backend/services/session_summary.py",
    "backend/services/trifecta_service.py",
    "backend/services/scan_presets.py",
    "backend/services/codex_service.py",
    "backend/services/quest_service.py",
    "backend/testing/store_reducers.py",
    # The tracking engine: the highest-value target. It runs against an
    # in-memory SQLite database and an in-process event bus, with no device or
    # OS dependency, so the stateful and integration suites exercise it in full.
    "backend/tracking/tracker.py",
]
# The engine works in a copied `mutants/` tree, so the package it imports at
# test time (sources, the curated data tables, the test files, conftest) must
# travel with it. The default copy set only covers a top-level tests/ folder;
# this project keeps tests under backend/, so copy the whole package.
also_copy = ["backend"]
# Only the pure-logic test files are run per mutant. Selecting them by name
# keeps the device-touching modules (which import cv2 at collection time and
# only run on Windows) out of the Linux campaign, and runs each mutant against
# just the tests that exercise it.
pytest_add_cli_args_test_selection = [
    "backend/tests/test_cost_engine.py",
    "backend/tests/test_cost_engine_properties.py",
    "backend/tests/test_character_calc.py",
    "backend/tests/test_character_calc_properties.py",
    "backend/tests/test_codex_formulas.py",
    "backend/tests/test_codex_properties.py",
    "backend/tests/test_tt_curve_properties.py",
    "backend/tests/test_scan_drift.py",
    "backend/tests/test_loot_filter.py",
    "backend/tests/test_tool_inference.py",
    "backend/tests/test_skill_panel_parse.py",
    # Test files exercising the property-covered service layer and the tracking
    # engine added above. Each module's example-based and property-based suites
    # are listed together so a mutant is met by every test that touches it.
    "backend/tests/test_chatlog_parser.py",
    "backend/tests/test_chatlog_parser_properties.py",
    "backend/tests/test_mob_lookup_service.py",
    "backend/tests/test_mob_lookup_service_properties.py",
