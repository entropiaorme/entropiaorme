# Keep the device tier out (redundant with the explicit selection above, but it
# keeps the intent legible and guards against a selected file growing a slow
# case). The Hypothesis profile is pinned via HYPOTHESIS_PROFILE in the runner
# environment to the bounded, derandomised `mutation` profile (see conftest.py):
# the run must be reproducible to gate on, and a 1000-example nightly profile
# times thousands of mutants would be intractable.
pytest_add_cli_args = ["-m", "not full"]
# Mutate every line in the targeted modules rather than restricting to
# coverage-filtered lines. The coverage-filtered path runs a pre-mutation
# coverage pass in the same process, which imports the unmutated modules and
# leaves them cached; the later run then cannot match tests to mutants. Mutating
# every line is also the franker measure: a mutant on an unexercised line simply
# survives, which is the gap showing up where it should.
mutate_only_covered_lines = false
